<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11111b" />
      <stop offset="50%" stop-color="#181825" />
      <stop offset="100%" stop-color="#1e1e2e" />
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea76cb" />
      <stop offset="100%" stop-color="#8839ef" />
    </linearGradient>

    <!-- Glass border -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-logo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="800" height="250" fill="url(#bg)" rx="16" />

  <!-- Abstract shapes in background for glass effect -->
  <circle cx="150" cy="50" r="100" fill="#ea76cb" opacity="0.15" filter="url(#glow)" />
  <circle cx="650" cy="200" r="120" fill="#8839ef" opacity="0.15" filter="url(#glow)" />
  <circle cx="400" cy="125" r="80" fill="#1e66f5" opacity="0.1" filter="url(#glow)" />

  <!-- Glass Card -->
  <rect x="50" y="40" width="700" height="170" rx="16" fill="rgba(30, 30, 46, 0.4)" stroke="url(#glass-border)" stroke-width="1.5" />

  <!-- Logo Mark -->
  <g transform="translate(250, 85)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#logo-grad)" filter="url(#glow-logo)" />
    <text x="40" y="55" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="48" fill="#ffffff" text-anchor="middle">M</text>
  </g>

  <!-- Title & Subtitle -->
  <text x="360" y="122" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="52" fill="#cdd6f4">Miria</text>
  <circle cx="515" cy="122" r="7" fill="#ea76cb" filter="url(#glow-logo)" />
  <text x="360" y="152" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="16" fill="#a6adc8" letter-spacing="2">CODE EDITOR</text>

  <!-- Decorative Editor Dots -->
  <g transform="translate(75, 65)">
    <circle cx="0" cy="0" r="6" fill="#f38ba8" />
    <circle cx="20" cy="0" r="6" fill="#f9e2af" />
    <circle cx="40" cy="0" r="6" fill="#a6e3a1" />
  </g>
</svg>
